<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Secure File Sharing — {% block title %}Dashboard{% endblock %}</title>
    <meta name="description" content="CISC 468 Secure Peer-to-Peer File Sharing Application">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Top navigation bar -->
    <header class="navbar">
        <div class="navbar-brand">
            <span class="navbar-icon">🔒</span>
            <span class="navbar-title">P2P Secure File Sharing</span>
        </div>
        <div class="navbar-peer-id">
            <span class="label">My Peer ID:</span>
            <code class="peer-id-value">{{ state.peer_id }}</code>
        </div>
    </header>

    <!-- Main content area (full height, no footer) -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
